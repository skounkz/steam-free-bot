name: Steam Free Games Bot

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:        # bouton "Run" manuel sur GitHub

permissions:
  contents: write           # pour que le bot puisse commit seen_games.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py

      - name: Sauvegarder les jeux vus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_games.json
          git diff --staged --quiet || git commit -m "update seen games"
          git push
